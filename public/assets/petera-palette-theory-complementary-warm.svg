<svg width="1880" height="1090" viewBox="0 0 1880 1090" xmlns="http://www.w3.org/2000/svg">
  <rect width="1880" height="1090" fill="#EEE9DE"/>
  <text x="88" y="86" fill="#2A251F" font-size="34" font-family="Atkinson Hyperlegible, sans-serif" font-weight="700">Petera Palette: Complementary Warm</text>
  <text x="88" y="126" fill="#6B6255" font-size="20" font-family="Atkinson Hyperlegible, sans-serif">Built from brand blue #7B97F8 (hue ~227°) with low-saturation warm complements for light surfaces and low-chroma blue-violet neutrals for dark surfaces.</text>

  <g transform="translate(72 168)">
    <rect width="1736" height="286" rx="36" fill="#F5F1E8"/>
    <text x="34" y="44" fill="#2A251F" font-size="26" font-family="Atkinson Hyperlegible, sans-serif" font-weight="700">Light Theme</text>
    <g transform="translate(34 76)">
      <g transform="translate(0 0)"><rect width="182" height="182" rx="28" fill="#F5F1E8" stroke="#D6CCBE" stroke-width="4"/><text x="0" y="214" fill="#2A251F" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">background</text><text x="0" y="242" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#F5F1E8</text></g>
      <g transform="translate(214 0)"><rect width="182" height="182" rx="28" fill="#ECE4D7"/><text x="0" y="214" fill="#2A251F" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">surface</text><text x="0" y="242" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#ECE4D7</text></g>
      <g transform="translate(428 0)"><rect width="182" height="182" rx="28" fill="#7B97F8"/><text x="0" y="214" fill="#2A251F" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">primary</text><text x="0" y="242" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#7B97F8</text></g>
      <g transform="translate(642 0)"><rect width="182" height="182" rx="28" fill="#AAB9FB"/><text x="0" y="214" fill="#2A251F" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">accent</text><text x="0" y="242" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#AAB9FB</text></g>
      <g transform="translate(856 0)"><rect width="182" height="182" rx="28" fill="#2A251F"/><text x="0" y="214" fill="#2A251F" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">text</text><text x="0" y="242" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#2A251F</text></g>
      <g transform="translate(1070 0)"><rect width="182" height="182" rx="28" fill="#6B6255"/><text x="0" y="214" fill="#2A251F" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">muted</text><text x="0" y="242" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#6B6255</text></g>
      <g transform="translate(1284 0)"><rect width="182" height="182" rx="28" fill="#E6EAFF"/><text x="0" y="214" fill="#2A251F" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">primarySoft</text><text x="0" y="242" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#E6EAFF</text></g>
      <g transform="translate(1498 0)"><rect width="182" height="182" rx="28" fill="#D6CCBE"/><text x="0" y="214" fill="#2A251F" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">border</text><text x="0" y="242" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#D6CCBE</text></g>
    </g>
  </g>

  <g transform="translate(72 570)">
    <rect width="1736" height="286" rx="36" fill="#1D1E28"/>
    <text x="34" y="44" fill="#F5F1E8" font-size="26" font-family="Atkinson Hyperlegible, sans-serif" font-weight="700">Dark Theme</text>
    <g transform="translate(34 76)">
      <g transform="translate(0 0)"><rect width="182" height="182" rx="28" fill="#1D1E28" stroke="#45495B" stroke-width="4"/><text x="0" y="214" fill="#F5F1E8" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">background</text><text x="0" y="242" fill="#BDB5A8" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#1D1E28</text></g>
      <g transform="translate(214 0)"><rect width="182" height="182" rx="28" fill="#2A2C38"/><text x="0" y="214" fill="#F5F1E8" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">surface</text><text x="0" y="242" fill="#BDB5A8" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#2A2C38</text></g>
      <g transform="translate(428 0)"><rect width="182" height="182" rx="28" fill="#7B97F8"/><text x="0" y="214" fill="#F5F1E8" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">primary</text><text x="0" y="242" fill="#BDB5A8" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#7B97F8</text></g>
      <g transform="translate(642 0)"><rect width="182" height="182" rx="28" fill="#AAB9FB"/><text x="0" y="214" fill="#F5F1E8" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">accent</text><text x="0" y="242" fill="#BDB5A8" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#AAB9FB</text></g>
      <g transform="translate(856 0)"><rect width="182" height="182" rx="28" fill="#F5F1E8"/><text x="0" y="214" fill="#F5F1E8" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">text</text><text x="0" y="242" fill="#BDB5A8" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#F5F1E8</text></g>
      <g transform="translate(1070 0)"><rect width="182" height="182" rx="28" fill="#BDB5A8"/><text x="0" y="214" fill="#F5F1E8" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">muted</text><text x="0" y="242" fill="#BDB5A8" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#BDB5A8</text></g>
      <g transform="translate(1284 0)"><rect width="182" height="182" rx="28" fill="#313A62"/><text x="0" y="214" fill="#F5F1E8" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">primarySoft</text><text x="0" y="242" fill="#BDB5A8" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#313A62</text></g>
      <g transform="translate(1498 0)"><rect width="182" height="182" rx="28" fill="#45495B"/><text x="0" y="214" fill="#F5F1E8" font-size="22" font-family="Atkinson Hyperlegible, sans-serif">border</text><text x="0" y="242" fill="#BDB5A8" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">#45495B</text></g>
    </g>
  </g>

  <g transform="translate(88 908)">
    <text x="0" y="0" fill="#2A251F" font-size="24" font-family="Atkinson Hyperlegible, sans-serif" font-weight="700">Measured Contrast</text>
    <text x="0" y="38" fill="#2A251F" font-size="20" font-family="Atkinson Hyperlegible, sans-serif">Light: text/background 13.47, muted/background 5.32, muted/surface 4.75</text>
    <text x="0" y="70" fill="#2A251F" font-size="20" font-family="Atkinson Hyperlegible, sans-serif">Dark: text/background 14.69, muted/background 8.15, primary/background 6.01, accent/background 8.70</text>
    <text x="0" y="102" fill="#6B6255" font-size="18" font-family="Atkinson Hyperlegible, sans-serif">Note: primary is a brand/action color, not a light-theme body-text color; on the light background it only reaches 2.44 contrast.</text>
  </g>
</svg>
