    <g transform="translate(512 512) scale(1.65)">
      <g transform="rotate(180)">
        <path d="M0,-274C56,-274 108,-228 108,-166C108,-114 70,-64 0,-18C-70,-64 -108,-114 -108,-166C-108,-228 -56,-274 0,-274Z" fill="#7189E7"/>
        <path d="M0,-250C34,-250 62,-222 62,-188C62,-154 40,-126 0,-92C-40,-126 -62,-154 -62,-188C-62,-222 -34,-250 0,-250Z" fill="#D9E0FB" opacity="0.75"/>
      </g>
      <g transform="rotate(252)">
        <path d="M0,-274C56,-274 108,-228 108,-166C108,-114 70,-64 0,-18C-70,-64 -108,-114 -108,-166C-108,-228 -56,-274 0,-274Z" fill="#7189E7"/>
        <path d="M0,-250C34,-250 62,-222 62,-188C62,-154 40,-126 0,-92C-40,-126 -62,-154 -62,-188C-62,-222 -34,-250 0,-250Z" fill="#D9E0FB" opacity="0.75"/>
      </g>
      <g transform="rotate(324)">
        <path d="M0,-274C56,-274 108,-228 108,-166C108,-114 70,-64 0,-18C-70,-64 -108,-114 -108,-166C-108,-228 -56,-274 0,-274Z" fill="#7189E7"/>
        <path d="M0,-250C34,-250 62,-222 62,-188C62,-154 40,-126 0,-92C-40,-126 -62,-154 -62,-188C-62,-222 -34,-250 0,-250Z" fill="#D9E0FB" opacity="0.75"/>
      </g>
      <g transform="rotate(36)">
        <path d="M0,-274C56,-274 108,-228 108,-166C108,-114 70,-64 0,-18C-70,-64 -108,-114 -108,-166C-108,-228 -56,-274 0,-274Z" fill="#7189E7"/>
        <path d="M0,-250C34,-250 62,-222 62,-188C62,-154 40,-126 0,-92C-40,-126 -62,-154 -62,-188C-62,-222 -34,-250 0,-250Z" fill="#D9E0FB" opacity="0.75"/>
      </g>
      <g transform="rotate(108)">
        <path d="M0,-274C56,-274 108,-228 108,-166C108,-114 70,-64 0,-18C-70,-64 -108,-114 -108,-166C-108,-228 -56,-274 0,-274Z" fill="#7189E7"/>
        <path d="M0,-250C34,-250 62,-222 62,-188C62,-154 40,-126 0,-92C-40,-126 -62,-154 -62,-188C-62,-222 -34,-250 0,-250Z" fill="#D9E0FB" opacity="0.75"/>
      </g>
