<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Petera social card">
  <defs>
    <g id="petera-petal">
      <path d="M0,-274C56,-274 108,-228 108,-166C108,-114 70,-64 0,-18C-70,-64 -108,-114 -108,-166C-108,-228 -56,-274 0,-274Z" />
    </g>
  </defs>

  <rect width="1200" height="630" fill="#F4F1EA" />

  <!-- Ghost petal texture: top-left (small) -->
  <g transform="translate(185 160) scale(0.25) rotate(45)" fill="#FCFAF5">
    <use href="#petera-petal" transform="rotate(180)" />
    <use href="#petera-petal" transform="rotate(252)" />
    <use href="#petera-petal" transform="rotate(324)" />
    <use href="#petera-petal" transform="rotate(36)" />
    <use href="#petera-petal" transform="rotate(108)" />
    <path d="M0,-92L16,-28L82,-28L28,12L48,74L0,36L-48,74L-28,12L-82,-28L-16,-28Z" fill="#F4F1EA"/>
    <circle r="56" />
    <circle r="26" fill="#F4F1EA" />
  </g>

  <!-- Ghost petal texture: top-right (medium) -->
  <g transform="translate(450 500) scale(0.5) rotate(60)" fill="#FCFAF5">
    <use href="#petera-petal" transform="rotate(180)" />
    <use href="#petera-petal" transform="rotate(252)" />
    <use href="#petera-petal" transform="rotate(324)" />
    <use href="#petera-petal" transform="rotate(36)" />
    <use href="#petera-petal" transform="rotate(108)" />
    <path d="M0,-92L16,-28L82,-28L28,12L48,74L0,36L-48,74L-28,12L-82,-28L-16,-28Z" fill="#F4F1EA"/>
    <circle r="56" />
    <circle r="26" fill="#F4F1EA" />
  </g>

  <!-- Ghost petal texture: top-center (big) -->
  <g transform="translate(600 150) scale(0.7) rotate(30)" fill="#FCFAF5">
    <use href="#petera-petal" transform="rotate(180)" />
    <use href="#petera-petal" transform="rotate(252)" />
    <use href="#petera-petal" transform="rotate(324)" />
    <use href="#petera-petal" transform="rotate(36)" />
