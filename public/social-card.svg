      <circle r="56" fill="#EBA937"/>
      <circle r="26" fill="#242118"/>
    </g>
  </g>

  <!-- App name -->
  <text
    x="110"
    y="305"
    fill="#7189E7"
    font-size="104"
    font-family="Noto Sans Display, Noto Sans, Arial, sans-serif"
    font-weight="500"
    font-variant="small-caps"
  >Petera</text>

  <!-- Tagline, split across two lines to stay within the left column -->
  <text
    x="110"
    y="364"
    fill="#242118"
    font-size="28"
    font-family="Noto Sans, Arial, sans-serif"
    font-weight="500"
  >Keep reminders in view</text>
  <text
    x="110"
    y="402"
    fill="#242118"
    font-size="28"
    font-family="Noto Sans, Arial, sans-serif"
    font-weight="500"
  >until you deal with them.</text>

  <!-- Domain -->
  <text
    x="110"
    y="598"
    fill="#6E6558"
    font-size="22"
    font-family="Noto Sans, Arial, sans-serif"
    font-weight="400"
