version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:15'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
